<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Carter - Remote Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6f7f9;
            /* Soft noise and gradient background */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            color: #1e293b;
        }
        .font-serif-custom {
            font-family: 'Playfair Display', serif;
        }
        .font-logo {
            font-family: 'Great Vibes', cursive;
        }
        .glass-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }
        .dark-btn {
            background: #2b354e;
            color: white;
            box-shadow: 0 8px 20px rgba(43, 53, 78, 0.25);
            transition: all 0.3s ease;
        }
        .dark-btn:hover {
            background: #1e2538;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(43, 53, 78, 0.35);
        }
        
        .floating-dock {
            background: rgba(43, 53, 78, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Subtle ambient light beams using CSS */
        .ambient-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        .ambient-light::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 50%;
            height: 140%;
            background: linear-gradient(115deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 60%);
            transform: rotate(25deg);
            filter: blur(80px);
        }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden antialiased flex flex-col items-center">
    
    <div class="ambient-light"></div>

    <!-- Header -->
    <header class="w-full max-w-7xl mx-auto px-6 py-8 flex justify-between items-center z-10">
        <div class="text-[2rem] font-logo font-medium tracking-wide text-slate-800">
            Sophie Carter
        </div>
        <nav class="hidden md:flex items-center gap-10 text-[15px] font-medium text-slate-700">
            <a href="#" class="hover:text-black transition-colors">Projects</a>
            <a href="#" class="hover:text-black transition-colors">Services</a>
            <a href="#" class="hover:text-black transition-colors">Contact</a>
        </nav>
        <button class="dark-btn px-6 py-3 rounded-xl font-semibold text-sm">
            Get In Touch
        </button>
    </header>

    <!-- Hero Section -->
    <main class="flex-1 w-full max-w-5xl mx-auto px-4 flex flex-col items-center justify-center mt-16 md:mt-24 z-10 text-center">
        
        <h1 class="font-serif-custom text-5xl md:text-[5.5rem] lg:text-[6.5rem] leading-[1.1] text-slate-800 tracking-tight">
            <div class="flex items-center justify-center gap-4 md:gap-6 mb-3 flex-wrap">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&h=200&q=80" alt="Sophie avatar" class="w-16 h-16 md:w-24 md:h-24 lg:w-28 lg:h-28 rounded-3xl object-cover shadow-2xl border border-white/50">
                <span>I'm Sophie</span>
            </div>
            <div class="flex items-center justify-center gap-4 md:gap-6 flex-wrap">
                <span>Remote Designer</span>
                <div class="relative group mt-2 md:mt-0">
                    <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=200&h=200&q=80" alt="Cloud" class="w-14 h-14 md:w-20 md:h-20 lg:w-24 lg:h-24 rounded-[1.25rem] object-cover shadow-xl border border-white/50">
                </div>
                <div class="relative group mt-2 md:mt-0">
                    <img src="https://images.unsplash.com/photo-1532767153582-b1a0e5145009?auto=format&fit=crop&w=200&h=200&q=80" alt="Moon" class="w-14 h-14 md:w-20 md:h-20 lg:w-24 lg:h-24 rounded-[1.25rem] object-cover shadow-xl border border-white/50">
                </div>
            </div>
        </h1>

        <p class="mt-10 md:mt-12 text-slate-600 text-base md:text-[1.1rem] max-w-2xl font-medium leading-relaxed">
            I specialize in creating thoughtful and impactful products,<br class="hidden md:block">
            collaborating with startups and leading brands
        </p>

        <div class="mt-10 md:mt-12 flex flex-col sm:flex-row items-center gap-4">
            <button class="dark-btn px-8 py-4 rounded-2xl font-semibold text-[15px] flex items-center gap-2.5 group">
                <i data-lucide="arrow-up-right" class="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                Get Template
            </button>
            <button class="glass-btn px-8 py-4 rounded-2xl font-semibold text-[15px] text-slate-700 flex items-center gap-2.5 hover:bg-white/90">
                <i data-lucide="arrow-right" class="w-4 h-4 text-slate-500"></i>
                See Projects
            </button>
        </div>

        <!-- Preview Cards Section (Partially visible at bottom) -->
        <div class="w-full mt-24 flex gap-6 overflow-hidden pb-32">
            <div class="w-1/3 h-72 bg-white rounded-3xl shadow-2xl border border-slate-100 p-5 opacity-70 scale-[0.9] origin-bottom translate-y-4">
                <div class="w-full h-full bg-slate-50 rounded-2xl border border-slate-100/50 flex flex-col pt-8 px-6">
                    <div class="text-sm font-bold text-slate-800 mb-2">But Why CourseSite ?</div>
                    <div class="w-3/4 h-2 bg-slate-200 rounded-full mb-4"></div>
                    <div class="w-full h-32 bg-slate-200 rounded-xl mt-auto"></div>
                </div>
            </div>
            <div class="w-1/3 h-80 bg-white rounded-t-[2.5rem] shadow-2xl border border-slate-100 border-b-0 p-5 relative z-10">
                 <div class="w-full h-full bg-[#f3e8ff] rounded-t-3xl border border-slate-100/50 flex flex-col overflow-hidden">
                    <div class="w-full h-12 bg-white/50 backdrop-blur border-b border-white/20 flex items-center justify-center gap-4 px-4 text-[10px] font-semibold text-slate-500">
                        <span>User Stories</span>
                        <span>Product</span>
                        <span>Reviews</span>
                        <span>Pricing</span>
                        <span>FAQ's</span>
                    </div>
                    <div class="flex-1 p-6">
                         <div class="w-12 h-12 bg-white rounded-xl shadow-sm mb-6"></div>
                         <div class="w-full h-4 bg-white/60 rounded-full mb-3"></div>
                         <div class="w-2/3 h-4 bg-white/60 rounded-full"></div>
                    </div>
                </div>
            </div>
            <div class="w-1/3 h-72 bg-white rounded-3xl shadow-2xl border border-slate-100 p-5 opacity-70 scale-[0.9] origin-bottom translate-y-4">
                 <div class="w-full h-full bg-[#0f766e] rounded-2xl border border-slate-100/50 flex flex-col overflow-hidden">
                    <div class="w-full h-12 bg-white/10 backdrop-blur border-b border-white/5 flex items-center justify-center gap-4 px-4 text-[10px] font-medium text-white/70">
                        <span>Features</span>
                        <span>Pricing</span>
                        <span>Changelog</span>
                    </div>
                    <div class="flex-1 p-6 flex flex-col items-center justify-center text-center">
                        <div class="text-white font-serif text-2xl mb-2 opacity-30">Automate. Engage.</div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Floating Dock -->
    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 floating-dock rounded-[2rem] p-2 flex items-center shadow-2xl">
        <button class="px-6 py-3 text-white/70 hover:text-white hover:bg-white/10 rounded-[1.5rem] text-[15px] font-medium transition-colors">Home</button>
        <button class="px-6 py-3 text-white/70 hover:text-white hover:bg-white/10 rounded-[1.5rem] text-[15px] font-medium transition-colors">Projects</button>
        <button class="px-6 py-3 text-white/70 hover:text-white hover:bg-white/10 rounded-[1.5rem] text-[15px] font-medium transition-colors">Services</button>
        <button class="px-6 py-3 text-white/70 hover:text-white hover:bg-white/10 rounded-[1.5rem] text-[15px] font-medium transition-colors">Contact</button>
        <div class="w-px h-6 bg-white/10 mx-2"></div>
        <button class="px-6 py-3 bg-white/10 text-white rounded-[1.5rem] text-[15px] font-medium border border-white/10 hover:bg-white/20 transition-colors">Get Template</button>
    </div>

    <!-- Floating Badges (Bottom Right) -->
    <div class="fixed bottom-10 right-10 z-50 flex flex-col gap-3 items-end">
        <button class="bg-[#111] text-white px-4 py-2.5 rounded-xl text-[13px] font-medium flex items-center gap-2 shadow-xl border border-white/10 hover:scale-105 transition-transform">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"></path></svg>
            Get Portfoy
        </button>
        <button class="bg-white text-slate-800 px-4 py-2.5 rounded-xl text-[13px] font-bold flex items-center gap-2 shadow-xl border border-slate-200 hover:scale-105 transition-transform">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 0L24 12H12V24L0 12H12V0Z" fill="currentColor"/></svg>
            Made in Framer
        </button>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
